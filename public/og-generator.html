<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0E0E0C;
    font-family: 'Manrope', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  /* Subtle green glow */
  .glow {
    position: absolute;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(29,158,117,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .logo {
    width: 80px;
    height: 80px;
    border-radius: 18px;
  }
  .headline {
    text-align: center;
    line-height: 1.15;
  }
  .headline .line1 {
    font-size: 52px;
    font-weight: 800;
    color: #e5e2de;
    display: block;
  }
  .headline .line2 {
    font-size: 52px;
    font-weight: 800;
    background: linear-gradient(135deg, #68dbae, #1D9E75);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: block;
  }
  .subtitle {
    font-size: 20px;
    color: #87948c;
    font-weight: 400;
    letter-spacing: 0.5px;
  }
  .features {
    font-size: 16px;
    color: #87948c;
    font-weight: 500;
    letter-spacing: 1px;
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .features .dot {
    color: #1D9E75;
  }
  .divider {
    width: 120px;
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 4px 0;
  }
  .url {
    font-size: 22px;
    font-weight: 700;
    color: #1D9E75;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="content">
    <img src="neto-icon.png" class="logo" alt="Neto">
    <div class="headline">
      <span class="line1">Descubre a donde se van</span>
      <span class="line2">tus S/3,000 al mes</span>
    </div>
    <div class="subtitle">Asistente financiero por WhatsApp &middot; Peru</div>
    <div class="features">
      <span>6 bancos</span>
      <span class="dot">&middot;</span>
      <span>IA</span>
      <span class="dot">&middot;</span>
      <span>Dashboard</span>
      <span class="dot">&middot;</span>
      <span>Desde S/0</span>
    </div>
    <div class="divider"></div>
    <div class="url">neto.pe</div>
  </div>
</body>
</html>
